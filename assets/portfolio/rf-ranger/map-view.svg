<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">RF Ranger map view</title>
  <desc id="desc">Stylized map-oriented view of the RF Ranger application showing sites, links, and analysis panels.</desc>
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101828"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d2940"/>
      <stop offset="100%" stop-color="#152136"/>
    </linearGradient>
    <linearGradient id="mapbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d7e3c2"/>
      <stop offset="100%" stop-color="#b7d3a7"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="#0b1220"/>
  <rect x="72" y="58" width="1056" height="604" rx="34" fill="url(#frame)" stroke="#2d3a53" stroke-width="6"/>

  <text x="120" y="126" font-size="50" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" font-weight="700" fill="#f8fafc">RF Ranger</text>
  <text x="120" y="166" font-size="24" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#cbd5e1">Map-driven RF planning and link analysis workspace</text>

  <rect x="102" y="196" width="252" height="424" rx="22" fill="url(#panel)" stroke="#334155" stroke-width="4"/>
  <text x="130" y="240" font-size="26" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" font-weight="700" fill="#38bdf8">Sites</text>
  <rect x="126" y="264" width="204" height="62" rx="14" fill="#22314d"/>
  <text x="148" y="302" font-size="22" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#f8fafc">Mountain Relay</text>
  <rect x="126" y="340" width="204" height="62" rx="14" fill="#22314d"/>
  <text x="148" y="378" font-size="22" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#f8fafc">Field Sensor A</text>
  <rect x="126" y="416" width="204" height="62" rx="14" fill="#22314d"/>
  <text x="148" y="454" font-size="22" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#f8fafc">Field Sensor B</text>
  <rect x="126" y="492" width="204" height="98" rx="14" fill="#111827" stroke="#334155" stroke-width="3"/>
  <text x="148" y="528" font-size="20" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#cbd5e1">Simulation</text>
  <text x="148" y="560" font-size="18" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#93c5fd">12 paths queued</text>
  <text x="148" y="584" font-size="18" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#86efac">9 viable links</text>

  <rect x="382" y="196" width="500" height="424" rx="22" fill="url(#mapbg)" stroke="#7aa37c" stroke-width="4"/>
  <path d="M410 560 C500 470 520 340 640 280 C760 220 840 260 850 220" fill="none" stroke="#8b7355" stroke-width="16" stroke-linecap="round" opacity="0.6"/>
  <path d="M408 266 L854 536" stroke="#9fb7d7" stroke-width="6" opacity="0.6"/>
  <path d="M456 228 C516 308 546 390 596 454 C650 520 736 560 828 586" fill="none" stroke="#7dbb8d" stroke-width="22" stroke-linecap="round" opacity="0.45"/>

  <circle cx="520" cy="290" r="18" fill="#ef4444" stroke="#7f1d1d" stroke-width="4"/>
  <circle cx="676" cy="394" r="18" fill="#2563eb" stroke="#1e3a8a" stroke-width="4"/>
  <circle cx="786" cy="500" r="18" fill="#eab308" stroke="#854d0e" stroke-width="4"/>

  <line x1="520" y1="290" x2="676" y2="394" stroke="#38bdf8" stroke-width="8" stroke-dasharray="14 10"/>
  <line x1="676" y1="394" x2="786" y2="500" stroke="#38bdf8" stroke-width="8" stroke-dasharray="14 10"/>
  <line x1="520" y1="290" x2="786" y2="500" stroke="#22c55e" stroke-width="8" opacity="0.8"/>

  <rect x="906" y="196" width="192" height="424" rx="22" fill="url(#panel)" stroke="#334155" stroke-width="4"/>
  <text x="934" y="240" font-size="26" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" font-weight="700" fill="#38bdf8">Metrics</text>
  <text x="934" y="290" font-size="19" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#cbd5e1">Distance</text>
  <text x="934" y="316" font-size="24" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#f8fafc">14.2 km</text>
  <text x="934" y="362" font-size="19" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#cbd5e1">Path Loss</text>
  <text x="934" y="388" font-size="24" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#f8fafc">121.4 dB</text>
  <text x="934" y="434" font-size="19" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#cbd5e1">SNR</text>
  <text x="934" y="460" font-size="24" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#86efac">18.7 dB</text>
  <text x="934" y="506" font-size="19" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#cbd5e1">Link</text>
  <text x="934" y="532" font-size="24" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#86efac">Usable</text>
  <rect x="930" y="566" width="144" height="32" rx="10" fill="#1f3b2a"/>
  <text x="1002" y="588" text-anchor="middle" font-size="18" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#bbf7d0">Worker running</text>
</svg>
