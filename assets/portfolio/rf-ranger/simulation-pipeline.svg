<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">RF Ranger simulation pipeline</title>
  <desc id="desc">Illustration of RF Ranger simulation inputs, worker pipeline, and results flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="92" y="86" width="1016" height="548" rx="34" fill="#172033" stroke="#2d3a53" stroke-width="6"/>
  <text x="142" y="156" font-size="50" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" font-weight="700" fill="#f8fafc">Simulation pipeline</text>
  <text x="142" y="198" font-size="26" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#cbd5e1">From engineering inputs to link metrics and exportable results</text>

  <rect x="146" y="278" width="216" height="136" rx="20" fill="#1e293b" stroke="#334155" stroke-width="4"/>
  <text x="254" y="330" text-anchor="middle" font-size="28" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" font-weight="700" fill="#38bdf8">Inputs</text>
  <text x="254" y="372" text-anchor="middle" font-size="21" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#e2e8f0">Sites, radios, antennas, models</text>

  <rect x="492" y="278" width="216" height="136" rx="20" fill="#1e293b" stroke="#334155" stroke-width="4"/>
  <text x="600" y="330" text-anchor="middle" font-size="28" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" font-weight="700" fill="#38bdf8">Worker</text>
  <text x="600" y="372" text-anchor="middle" font-size="21" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#e2e8f0">Parallel RF calculations</text>

  <rect x="838" y="278" width="216" height="136" rx="20" fill="#1e293b" stroke="#334155" stroke-width="4"/>
  <text x="946" y="330" text-anchor="middle" font-size="28" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" font-weight="700" fill="#38bdf8">Results</text>
  <text x="946" y="372" text-anchor="middle" font-size="21" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#e2e8f0">SNR, path loss, link viability</text>

  <g stroke="#38bdf8" stroke-width="8" fill="none" stroke-linecap="round">
    <line x1="362" y1="346" x2="492" y2="346"/>
    <line x1="708" y1="346" x2="838" y2="346"/>
  </g>
  <g fill="#38bdf8">
    <polygon points="480,336 500,346 480,356"/>
    <polygon points="826,336 846,346 826,356"/>
  </g>

  <rect x="178" y="492" width="844" height="78" rx="18" fill="#111827" stroke="#334155" stroke-width="4"/>
  <text x="600" y="540" text-anchor="middle" font-size="24" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#cbd5e1">Worker-backed processing keeps the UI responsive while large RF result tables are generated locally in the browser.</text>
</svg>
