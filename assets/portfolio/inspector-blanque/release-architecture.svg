<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Inspector Blanque release architecture</title>
  <desc id="desc">Illustration of Inspector Blanque single-file packaging architecture.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1b1f"/>
      <stop offset="100%" stop-color="#0f1013"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="94" y="86" width="1012" height="548" rx="34" fill="#252526" stroke="#3e3e42" stroke-width="6"/>
  <text x="142" y="156" font-size="50" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">Single-file packaging</text>
  <text x="142" y="198" font-size="26" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#9da1a6">UI, parser, engine bootstrap, pieces, and WASM payload consolidated into one distributable HTML file</text>

  <rect x="142" y="270" width="220" height="136" rx="20" fill="#2d2d30" stroke="#3e3e42" stroke-width="4"/>
  <text x="252" y="324" text-anchor="middle" font-size="30" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" font-weight="700" fill="#0e639c">UI</text>
  <text x="252" y="364" text-anchor="middle" font-size="22" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#d4d4d4">HTML + CSS + app logic</text>

  <rect x="392" y="270" width="220" height="136" rx="20" fill="#2d2d30" stroke="#3e3e42" stroke-width="4"/>
  <text x="502" y="324" text-anchor="middle" font-size="30" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" font-weight="700" fill="#0e639c">Parser</text>
  <text x="502" y="364" text-anchor="middle" font-size="22" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#d4d4d4">Embedded chess.js module</text>

  <rect x="642" y="270" width="220" height="136" rx="20" fill="#2d2d30" stroke="#3e3e42" stroke-width="4"/>
  <text x="752" y="324" text-anchor="middle" font-size="30" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" font-weight="700" fill="#0e639c">Assets</text>
  <text x="752" y="364" text-anchor="middle" font-size="22" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#d4d4d4">Logo + chess piece SVGs</text>

  <rect x="892" y="270" width="220" height="136" rx="20" fill="#2d2d30" stroke="#3e3e42" stroke-width="4"/>
  <text x="1002" y="324" text-anchor="middle" font-size="30" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" font-weight="700" fill="#0e639c">Engine</text>
  <text x="1002" y="364" text-anchor="middle" font-size="22" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" fill="#d4d4d4">Stockfish worker + WASM</text>

  <g stroke="#67c1ff" stroke-width="8" fill="none" stroke-linecap="round">
    <line x1="252" y1="442" x2="252" y2="502"/>
    <line x1="502" y1="442" x2="502" y2="502"/>
    <line x1="752" y1="442" x2="752" y2="502"/>
    <line x1="1002" y1="442" x2="1002" y2="502"/>
  </g>

  <rect x="238" y="514" width="778" height="88" rx="24" fill="#1e1e1e" stroke="#3e3e42" stroke-width="4"/>
  <text x="627" y="566" text-anchor="middle" font-size="34" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" font-weight="700" fill="#ffffff">Inspector_Blanque_v3_3_0_single_file.html</text>
</svg>
