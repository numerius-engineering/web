<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Turbo Guacamole histogram view</title>
  <desc id="desc">Illustration of the Turbo Guacamole bucket histogram and summary area.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8de7f6"/>
      <stop offset="100%" stop-color="#ffe1b8"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff7f6a"/>
      <stop offset="100%" stop-color="#ffb703"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="112" y="92" width="976" height="536" rx="38" fill="rgba(255,255,255,0.64)" stroke="rgba(255,183,3,0.38)" stroke-width="8"/>
  <text x="154" y="164" font-size="50" font-family="Trebuchet MS, Arial, sans-serif" font-weight="700" fill="#013a63">Bucket counts</text>
  <text x="154" y="206" font-size="26" font-family="Trebuchet MS, Arial, sans-serif" fill="#01577f">The histogram trends toward a familiar bell-shaped distribution.</text>

  <g transform="translate(174 270)">
    <rect x="0" y="220" width="64" height="70" rx="14" fill="url(#bar)"/>
    <rect x="88" y="168" width="64" height="122" rx="14" fill="url(#bar)"/>
    <rect x="176" y="114" width="64" height="176" rx="14" fill="url(#bar)"/>
    <rect x="264" y="52" width="64" height="238" rx="14" fill="url(#bar)"/>
    <rect x="352" y="0" width="64" height="290" rx="14" fill="url(#bar)"/>
    <rect x="440" y="36" width="64" height="254" rx="14" fill="url(#bar)"/>
    <rect x="528" y="98" width="64" height="192" rx="14" fill="url(#bar)"/>
    <rect x="616" y="162" width="64" height="128" rx="14" fill="url(#bar)"/>
    <rect x="704" y="214" width="64" height="76" rx="14" fill="url(#bar)"/>
    <line x1="-18" y1="292" x2="806" y2="292" stroke="#0077b6" stroke-width="6" stroke-linecap="round"/>
  </g>

  <rect x="170" y="590" width="860" height="18" rx="9" fill="rgba(0,119,182,0.14)"/>
  <text x="186" y="640" font-size="24" font-family="Trebuchet MS, Arial, sans-serif" font-weight="700" fill="#013a63">Dropped: 324 • Collected: 324 • Mode bucket: 5</text>
</svg>
