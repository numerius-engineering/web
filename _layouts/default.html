<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">
    <link rel="icon" type="image/png" sizes="48x48" href="{{ '/assets/favicon-48.png' | relative_url }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32.png' | relative_url }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon-16.png' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <div class="site-shell">
      {% include navbar.html %}
      <main class="page-content">
        {{ content }}
      </main>
      <footer class="site-footer">
        <div class="footer-inner">
          <p>{{ site.title }}</p>
          <a href="mailto:{{ site.email }}">{{ site.email }}</a>
        </div>
      </footer>
    </div>
    <div class="image-lightbox" id="image-lightbox" hidden>
      <button class="image-lightbox-close" id="image-lightbox-close" aria-label="Close image preview">Close</button>
      <img class="image-lightbox-image" id="image-lightbox-image" alt="">
    </div>
    <script>
      (() => {
        const lightbox = document.getElementById("image-lightbox");
        const lightboxImage = document.getElementById("image-lightbox-image");
        const closeButton = document.getElementById("image-lightbox-close");
        if (!lightbox || !lightboxImage || !closeButton) return;

        const closeLightbox = () => {
          lightbox.hidden = true;
          lightboxImage.removeAttribute("src");
          lightboxImage.removeAttribute("alt");
          document.body.classList.remove("lightbox-open");
        };

        document.addEventListener("click", (event) => {
          const target = event.target;
          if (!(target instanceof HTMLImageElement)) return;
          if (!target.classList.contains("gallery-image")) return;
          lightboxImage.src = target.currentSrc || target.src;
          lightboxImage.alt = target.alt || "";
          lightbox.hidden = false;
          document.body.classList.add("lightbox-open");
        });

        closeButton.addEventListener("click", closeLightbox);
        lightbox.addEventListener("click", (event) => {
          if (event.target === lightbox) closeLightbox();
        });
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && !lightbox.hidden) closeLightbox();
        });
      })();
    </script>
  </body>
</html>
