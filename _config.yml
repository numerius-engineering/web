title: Numerius Engineering LLC
email: numerius.engineering@gmail.com
description: >-
  Consulting-led electronics product development across hardware, software,
  rapid prototyping, and application development.
baseurl: "/web"
url: "https://numerius-engineering.github.io"
permalink: pretty
markdown: kramdown

collections:
  portfolio:
    output: true

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - .bundle
  - _drafts
  - _site
  - vendor

defaults:
  -
    scope:
      path: ""
    values:
      layout: default
  -
    scope:
      path: ""
      type: portfolio
    values:
      layout: default
